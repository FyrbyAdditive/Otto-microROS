# slam_toolbox configuration for Otto Starter
# Tuned for a single ultrasonic beam (very sparse data).

slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_scan_matching: false   # single ultrasonic beam — not enough data for matching
    mode: mapping

    # Thresholds before processing a new scan
    minimum_travel_distance: 0.1      # meters
    minimum_travel_heading: 0.2       # radians

    # Map parameters
    resolution: 0.05                  # meters per cell
    max_laser_range: 4.0              # ultrasonic max range
    map_update_interval: 2.0          # seconds

    # Transform parameters
    transform_publish_period: 0.05    # 20Hz TF updates
    tf_buffer_duration: 30.0

    # Scan matching tuning (relaxed for noisy ultrasonic)
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 4.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 3.0
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    loop_search_maximum_distance: 3.0

    # Performance
    throttle_scans: 1
    enable_interactive_mode: true
