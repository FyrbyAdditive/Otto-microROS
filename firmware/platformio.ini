; PlatformIO configuration for HP Robots Otto Starter Kit
; micro-ROS over WiFi/UDP on ESP32-WROOM-32E-N4

[env:otto_starter]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; ESP32-WROOM-32E-N8 has 8MB flash
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

; micro-ROS configuration
board_microros_transport = wifi
board_microros_distro = jazzy
board_microros_user_meta = custom_meta.meta

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    madhephaestus/ESP32Servo@^3.0.0
    adafruit/Adafruit NeoPixel@^1.12.0

build_flags =
    -DMICRO_ROS_TRANSPORT_ARDUINO_WIFI
    ; Set to 1 to use Feetech/Waveshare serial bus servos instead of PWM
    ; When enabled, GPIO 18/19 become servo UART (ultrasonic sensor disabled)
    -DSERVO_TYPE_SERIAL_BUS=0
